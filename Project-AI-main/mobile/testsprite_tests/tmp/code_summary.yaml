version: "2"
type: backend
tech_stack:
  - Python
  - FastAPI
  - Firebase Realtime Database
  - OpenAI/OpenRouter (LLM Agents)
features:
  - name: Cold Chain Breach Monitoring API
    description: Health checking and real-time cold chain temperature monitoring endpoints.
    files:
      - main.py
      - firebase_config.py
    endpoints:
      - method: GET
        path: /
        description: System health check
        auth_required: false
        response_schema:
          "200": HealthStatus
      - method: GET
        path: /sensors
        description: Returns all truck sensor readings from Firebase
        auth_required: false
        response_schema:
          "200": SensorList
      - method: GET
        path: /shipments
        description: Returns all shipments from Firebase with current status
        auth_required: false
        response_schema:
          "200": ShipmentList
  - name: AI Multi-Agent Breach Resolution API
    description: Trigger breach simulation and execute LLM orchestrator-agent containment pipeline.
    files:
      - main.py
      - agents/orchestrator.py
      - agents/sensor_monitor.py
      - agents/analysis_agent.py
      - agents/decision_agent.py
      - agents/execution_agent.py
    endpoints:
      - method: POST
        path: /trigger-breach
        description: Simulate a sensor reading a temperature breach and execute 4-agent containment pipeline
        auth_required: false
        request_schema:
          body:
            truck_id: string
            temperature: number
        response_schema:
          "200": AgentPipelineTrace
          "404": Truck not found
          "500": Database update failed
      - method: POST
        path: /analyze-unstructured
        description: Analyzes unstructured text report to extract truck_id and temperature and trigger breach response
        auth_required: false
        request_schema:
          body:
            content: string
        response_schema:
          "200": UnstructuredAnalysisResult
known_limitations: []
